name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on a PR/branch, but never cancel a run on main —
# every push to the trunk must complete (team-git-workflow.md §5).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      # Unit tests + the hermetic offline e2e (reconcile against a localhost GitHub
      # fixture with systemd mocked) + the CLI smoke tests all run here — no
      # Multipass, systemd or network required, so it stays free on hosted runners.
      # Real-VM validation is the manual, self-hosted `live-smoke` workflow.
      - name: test
        run: cargo test --all
      - name: build release
        run: cargo build --release
